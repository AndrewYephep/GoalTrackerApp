   const { useState, useEffect } = React;
const supabase = supabase.createClient('https://ifiiddpbsrvulixjlpab.supabase.co', 
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmaWlkZHBic3J2dWxpeGpscGFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzYyMDU1ODEsImV4cCI6MjA1MTc4MTU4MX0.WSesjcQcOFBjkiE-DLEZ04SMQFThj3MYFPJ6F0h5AfU'
);
const App = () => {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [goals, setGoals] = useState([]);
  const [currentTab, setCurrentTab] = useState("overview");
  const [selectedGoal, setSelectedGoal] = useState(null);
  const [viewMode, setViewMode] = useState('month');
  const [currentDate, setCurrentDate] = useState(luxon.DateTime.now());
  const [quickForm, setQuickForm] = useState({ visible: false, date: null });
  const [showSettings, setShowSettings] = useState(false);
  
const setupSubscription = (userId) => {
	  // Ensure only one subscription exists
	  return supabase
	    .channel(`goals:${userId}`)
	    .on('postgres_changes', {
	      event: '*',
	      schema: 'public',
	      table: 'goals',
	      filter: `user_id=eq.${userId}`,
	    }, (payload) => {
	      switch (payload.eventType) {
		case 'INSERT':
		  setGoals((current) => [payload.new, ...current]);
		  break;
		case 'UPDATE':
		  setGoals((current) =>
		    current.map((goal) =>
		      goal.id === payload.new.id ? payload.new : goal
		    )
		  );
		  break;
		case 'DELETE':
		  setGoals((current) =>
		    current.filter((goal) => goal.id !== payload.old.id)
		  );
		  if (selectedGoal === payload.old.id) {
		    setSelectedGoal(null);
		  }
		  break;
		default:
		  break;
	      }
	    })
	    .subscribe();
	};

  // Handle auth state changes
  useEffect(() => {
    let mounted = true;
    let subscription = null;

    const checkUser = async () => {
      try {
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();
        if (sessionError) throw sessionError;
        
        if (mounted) {
          setUser(session?.user ?? null);
          if (session?.user) {
            await fetchGoals(session.user.id);
          }
        }
      } catch (err) {
        if (mounted) {
          setError(err.message);
          setTimeout(() => setError(null), 5000); // Clear error after 5 seconds
        }
      } finally {
        if (mounted) {
          setLoading(false);
        }
      }
    };

    

    checkUser();

    const { data: { subscription: authSubscription } } = supabase.auth.onAuthStateChange(
      async (_event, session) => {
        if (mounted) {
          const newUser = session?.user ?? null;
          setUser(newUser);
          
          if (newUser) {
            await fetchGoals(newUser.id);
            setupSubscription(newUser.id);
          } else {
            setGoals([]);
            if (subscription) {
              supabase.removeChannel(subscription);
              subscription = null;
            }
          }
        }
      }
    );

    return () => {
      mounted = false;
      if (subscription) {
        supabase.removeChannel(subscription);
      }
      authSubscription.unsubscribe();
    };
  }, []);

  const fetchGoals = async (userId) => {
    try {
        const { data, error: fetchError } = await supabase
            .from('goals')
            .select('*')
            .eq('user_id', userId)
            .order('created_at', { ascending: false });

        if (fetchError) throw fetchError;

        setGoals(data || []); // Update the state with the fetched goals
    } catch (err) {
        setError(`Failed to fetch goals: ${err.message}`);
        setTimeout(() => setError(null), 5000); // Clear the error after 5 seconds
    }
};

  	useEffect(() => {
	  let subscription = null;

	  const initializeApp = async () => {
	    try {
	      const { data: { session }, error: sessionError } = await supabase.auth.getSession();
	      if (sessionError) throw sessionError;

	      setUser(session?.user ?? null);

	      if (session?.user) {
		await fetchGoals(session.user.id); // Fetch initial goals
		subscription = setupSubscription(session.user.id); // Setup single subscription
	      }
	    } catch (err) {
	      setError(err.message);
	    } finally {
	      setLoading(false);
	    }
	  };

	  initializeApp();

	  return () => {
	    if (subscription) {
	      supabase.removeChannel(subscription); // Cleanup subscription on unmount
	    }
	  };
	}, []);


	  const addGoal = async (goalData) => {
		  setError(null);
		  // Remove setIsLoading(true) from here since it's handled in Sidebar

		  try {
		    const now = luxon.DateTime.now().setZone('local');
		    const newGoal = {
		      ...goalData,
		      user_id: user.id,
		      created_at: now.toISO(),
		      checkups: [],
		    };

		    const { data, error } = await supabase
		      .from('goals')
		      .insert([newGoal])
		      .select();

		    if (error) throw error;

		    // Update local state immediately
		    if (data?.[0]) {
		      setGoals(current => [data[0], ...current]);
		    }
		  } catch (err) {
		    setError(`Failed to create goal: ${err.message}`);
		  }
		  // Remove setIsLoading(false) from here
		};

  const updateGoal = async (goalId, updates) => {
    const originalGoal = goals.find((goal) => goal.id === goalId);

    setGoals((current) =>
        current.map((goal) =>
            goal.id === goalId ? { ...goal, ...updates } : goal
        )
    ); // Optimistically update UI

    try {
        const { data, error } = await supabase
            .from('goals')
            .update(updates)
            .eq('id', goalId)
            .eq('user_id', user.id)
            .select();

        if (error) throw error;

        const updatedGoal = data[0];
        setGoals((current) =>
            current.map((goal) => (goal.id === goalId ? updatedGoal : goal))
        );
    } catch (err) {
        setError(err.message);
        setGoals((current) =>
            current.map((goal) => (goal.id === goalId ? originalGoal : goal))
        ); // Revert on error
    }
};


  const deleteGoal = async (goalId) => {
    if (!goalId) return;

    const confirmDelete = window.confirm(
        "Are you sure you want to delete this goal? This action cannot be undone."
    );

    if (!confirmDelete) return; // Exit if user cancels

    // Optimistically update state to remove the goal
    const originalGoals = [...goals];
    const goalToDelete = goals.find((goal) => goal.id === goalId);

    if (!goalToDelete) {
        setError("Goal not found. Please try again.");
        return;
    }

    // Remove the goal from state optimistically
    setGoals((current) => current.filter((goal) => goal.id !== goalId));

    // Clear selected goal if it's the one being deleted
    if (selectedGoal === goalId) {
        setSelectedGoal(null);
    }

    try {
        // Delete goal from Supabase
        const { error } = await supabase
            .from("goals")
            .delete()
            .eq("id", goalId)
            .eq("user_id", user.id);

        if (error) throw error;

        // Optionally show a success message
        setError("Goal successfully deleted.");
        setTimeout(() => setError(null), 3000); // Clear message after 3 seconds
    } catch (err) {
        // Revert state if delete fails
        setError(`Failed to delete goal: ${err.message}`);
        setGoals(originalGoals); // Restore original state
    }
};

  const handleQuickFormSubmit = async (status, notes) => {
    if (!selectedGoal || !quickForm.date) return;

    try {
        const goalToUpdate = goals.find((g) => g.id === selectedGoal);
        if (!goalToUpdate) throw new Error('Goal not found');

        const localDate = quickForm.date.setZone('local').toISODate(); // ISO date for comparison
        
        // Create a new checkup entry
        const updatedCheckups = (goalToUpdate.checkups || []).map(checkup => {
            const checkupDate = luxon.DateTime.fromISO(checkup.date).toISODate();
            return checkupDate === localDate
                ? { ...checkup, status, notes } // Overwrite notes for the same day
                : checkup; // Keep other notes unchanged
        });

        // If no checkup existed for this day, add the new entry
        if (!updatedCheckups.some(checkup => 
            luxon.DateTime.fromISO(checkup.date).toISODate() === localDate)) {
            updatedCheckups.push({
                date: quickForm.date.toISO(),
                status,
                notes,
            });
        }

        // Update the goal in Supabase
        const { data, error } = await supabase
            .from('goals')
            .update({ checkups: updatedCheckups })
            .eq('id', selectedGoal)
            .eq('user_id', user.id)
            .select();

        if (error) throw error;

        // Update the local state
        const updatedGoal = data[0];
        setGoals((current) =>
            current.map((goal) => (goal.id === selectedGoal ? updatedGoal : goal))
        );

        // Clear the quick form state
        setQuickForm({ visible: false, date: null });
    } catch (err) {
        setError(err.message);
        setTimeout(() => setError(null), 5000);
    }
};

   	 const getDaysInView = () => {
	    // Convert to user's local timezone
	    const localCurrentDate = currentDate.setZone('local');
	    const start = localCurrentDate.startOf('month').startOf('week').minus({ days: 1 });
	    const end = localCurrentDate.endOf('month').endOf('week').minus({ days: 1 });
	    const days = [];
	    let current = start;

	    while (current <= end) {
		days.push(current);
		current = current.plus({ days: 1 });
	    }

	    return days;
	};


    const getStatusForDay = (date) => {
    if (!selectedGoal) return null;

    const localDate = date.setZone('local').startOf('day');

    if (selectedGoal.dueDate) {
        const dueDate = luxon.DateTime.fromISO(selectedGoal.dueDate)
            .setZone('local')
            .startOf('day');

                status: 'due-date',
                message: `${selectedGoal.title} is due`,
            };
        }

    // Check for notes or status in `checkups`
    const checkup = selectedGoal.checkups?.find((c) => {
        const checkupDate = luxon.DateTime.fromISO(c.date)
            .setZone('local')
            .startOf('day');
        return checkupDate.equals(localDate);
    });

    if (checkup) {
        return {
            status: checkup.status,
            message: checkup.notes || '',
        };
    }

    return null;

				return (
				    <div

					className={`calendar-day

const WeeklyOverview = ({ goals }) => {
  const [filterType, setFilterType] = useState('all');
  const [timeRange, setTimeRange] = useState('this-week');
  const [sortBy, setSortBy] = useState('due-date');
  
  const filterGoals = () => {
    const today = luxon.DateTime.now();
    const startOfWeek = today.startOf("week");
    const endOfWeek = today.endOf("week");
    
    return goals.filter(goal => {
      // Type filter
      if (filterType !== 'all' && goal.type !== filterType) return false;
      
      const dueDate = goal.dueDate ? luxon.DateTime.fromISO(goal.dueDate) : null;
      
      // Time range filter
      switch (timeRange) {
        case 'this-week':
          return dueDate && dueDate >= startOfWeek && dueDate <= endOfWeek;
        case 'past-due':
          return dueDate && dueDate < today;
        case 'due-soon':
          return dueDate && dueDate >= today && dueDate <= today.plus({ days: 7 });
        case 'all':
          return true;
        default:
          return true;
      }
    }).sort((a, b) => {
      switch (sortBy) {
        case 'due-date':
          return luxon.DateTime.fromISO(a.dueDate) - luxon.DateTime.fromISO(b.dueDate);
        case 'priority':
          return (b.priority || 0) - (a.priority || 0);
        case 'progress':
          const progressA = calculateProgress(a);
          const progressB = calculateProgress(b);
          return progressB - progressA;
        default:
          return 0;
      }
    });
  };

  const calculateProgress = (goal) => {
    if (!goal.checkups?.length) return 0;
    const completedCheckups = goal.checkups.filter(c => c.status === 'done').length;
    return (completedCheckups / goal.checkups.length) * 100;
  };

  const filteredGoals = filterGoals();

  return (
    <div className="weekly-overview p-6">
      <div className="flex flex-wrap gap-4 mb-6">
        <select 
          value={filterType}
          onChange={(e) => setFilterType(e.target.value)}
          className="px-3 py-2 border rounded-lg"
        >
          <option value="all">All Types</option>
          <option value="goal">Goals</option>
          <option value="homework">Homework</option>
          <option value="project">Projects</option>
        </select>

        <select 
          value={timeRange}
          onChange={(e) => setTimeRange(e.target.value)}
          className="px-3 py-2 border rounded-lg"
        >
          <option value="this-week">This Week</option>
          <option value="all">All Items</option>
          <option value="past-due">Past Due</option>
          <option value="due-soon">Due Soon</option>
        </select>

        <select 
          value={sortBy}
          onChange={(e) => setSortBy(e.target.value)}
          className="px-3 py-2 border rounded-lg"
        >
          <option value="due-date">Sort by Due Date</option>
          <option value="priority">Sort by Priority</option>
          <option value="progress">Sort by Progress</option>
        </select>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {filteredGoals.length > 0 ? (
          filteredGoals.map(goal => (
            <EnhancedGoalCard key={goal.id} goal={goal} />
          ))
        ) : (
          <div className="col-span-full text-center italic text-gray-600">
            No items match the current filters.
          </div>
        )}
      </div>
    </div>
  );
};

  return (
    <div className="bg-white rounded-lg shadow-md hover:shadow-lg transition-shadow duration-200 p-4">
      <div className="flex justify-between items-start mb-4">
        <div>
          <h3 className="text-lg font-semibold mb-2">{goal.title}</h3>
          <div className="flex gap-2">
            <span className={`inline-flex items-center px-2 py-1 rounded-full text-xs font-medium ${typeColors[goal.type]}`}>
              {goal.type}
            </span>
            {goal.priority && (
              <span className="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                Priority {goal.priority}
              </span>
            )}
          </div>
        </div>
      </div>

      <div className="space-y-4">
        <div>
          <div className="flex justify-between mb-2">
            <span className="text-sm font-medium">Progress</span>
            <span className="text-sm text-gray-600">{Math.round(calculateProgress())}%</span>
          </div>
          <div className="w-full bg-gray-200 rounded-full h-2">
            <div 
              className="bg-blue-600 h-2 rounded-full transition-all duration-300"
              style={{ width: `${calculateProgress()}%` }}
            />
          </div>
        </div>

        <div className="flex flex-col gap-2 text-sm">
          <div className="flex justify-between text-gray-600">
            <span>Started:</span>
            <span>{luxon.DateTime.fromISO(goal.created_at).toFormat('LLL dd, yyyy')}</span>
          </div>
          {daysUntilDue() !== null && (
            <div className="flex justify-between">
              <span>Due in:</span>
              <span className={daysUntilDue() < 3 ? 'text-red-600 font-semibold' : 'text-gray-600'}>
                {daysUntilDue()} days
              </span>
            </div>
          )}
        </div>

        <div className="grid grid-cols-2 gap-4">
          <div className="bg-blue-50 rounded-lg p-3 text-center">
            <div className="text-sm text-gray-600 mb-1">Completed</div>
            <div className="text-lg font-semibold text-blue-600">
              {goal.checkups?.filter(c => c.status === 'done').length || 0}
            </div>
          </div>
          <div className="bg-green-50 rounded-lg p-3 text-center">
            <div className="text-sm text-gray-600 mb-1">Success Rate</div>
            <div className="text-lg font-semibold text-green-600">
              {Math.round(calculateProgress())}%
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};


const SettingsModal = ({ goal, onClose, onUpdate, onDelete }) => {
    const [title, setTitle] = useState(goal.title);
    const [description, setDescription] = useState(goal.description || '');
    const [frequency, setFrequency] = useState(goal.frequency || 'one-time');
    const [type, setType] = useState(goal.type || 'goal');
    const [dueDate, setDueDate] = useState(goal.dueDate || '');
    const [isSubmitting, setIsSubmitting] = useState(false);
    const [error, setError] = useState(null);

    // Reset form when the goal changes
    useEffect(() => {
        setTitle(goal.title);
        setDescription(goal.description || '');
        setFrequency(goal.frequency || 'one-time');
        setType(goal.type || 'goal');
        setDueDate(goal.dueDate || '');
    }, [goal]);

    const handleUpdate = async () => {
        setIsSubmitting(true);
        setError(null);

        try {
            if (!title.trim()) throw new Error('Title is required');
            const updates = {
                title: title.trim(),
                description: description.trim(),
                frequency,
                type,
                dueDate,
                updated_at: luxon.DateTime.now().toISO(),
            };

            await onUpdate(updates); // Update goal
            setIsSubmitting(false);
            onClose(); // Close modal on success
        } catch (err) {
            setError(err.message);
            setIsSubmitting(false);
        }
    };

    const handleDelete = async () => {
       
            setIsSubmitting(true);
            try {
                await onDelete();
                onClose(); // Close modal after deletion
            } catch (err) {
                setError(err.message);
                setIsSubmitting(false);
            }
        
    };

    return (
        <>
            <div className="overlay" onClick={onClose}></div>
            <div className="quick-form settings-modal">
                <h3>Edit Goal</h3>

                {error && (
                    <div className="error-message">
                        {error}
                    </div>
                )}

                <div className="form-group">
                    <label htmlFor="title">Title *</label>
                    <input
                        id="title"
                        type="text"
                        value={title}
                        onChange={(e) => setTitle(e.target.value)}
                        disabled={isSubmitting}
                        placeholder="Goal Name"
                    />
                </div>

                <div className="form-group">
                    <label htmlFor="description">Description</label>
                    <textarea
                        id="description"
                        value={description}
                        onChange={(e) => setDescription(e.target.value)}
                        disabled={isSubmitting}
                        rows="2"
                        placeholder="Optional description"
                    />
                </div>

                <div className="form-group">
                    <label htmlFor="frequency">Frequency</label>
                    <select
                        id="frequency"
                        value={frequency}
                        onChange={(e) => setFrequency(e.target.value)}
                        disabled={isSubmitting}
                    >
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="one-time">One-time</option>
                    </select>
                </div>

                <div className="form-group">
                    <label htmlFor="type">Type</label>
                    <select
                        id="type"
                        value={type}
                        onChange={(e) => setType(e.target.value)}
                        disabled={isSubmitting}
                    >
                        <option value="goal">Goal</option>
                        <option value="homework">Homework</option>
                        <option value="project">Project</option>
                    </select>
                </div>

                <div className="form-group">
                    <label htmlFor="dueDate">Due Date</label>
                    <input
                        id="dueDate"
                        type="date"
                        value={dueDate}
                        onChange={(e) => setDueDate(e.target.value)}
                        disabled={isSubmitting}
                    />
                </div>

                <div className="button-group">
                    <button
                        onClick={handleUpdate}
                        disabled={isSubmitting}
                        className="btn btn-update"
                    >
                        {isSubmitting ? 'Updating...' : 'Save Changes'}
                    </button>
                    <button
                        onClick={onClose}
                        disabled={isSubmitting}
                        className="btn btn-cancel"
                    >
                        Cancel
                    </button>
                    <button
                        onClick={handleDelete}
                        disabled={isSubmitting}
                        className="btn btn-delete"
                    >
                        {isSubmitting ? 'Deleting...' : 'Delete Goal'}
                    </button>
                </div>
            </div>
        </>
    );
};






    // Render the app
ReactDOM.render(<App />, document.getElementById('root'));

</script>
</body>
</html>
